<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login/Register</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* กล่อง */
.box {
    background: #fff;
    padding: 40px;
    width: 350px;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    text-align: center;
}

/* โลโก้ */
.logo {
    font-size: 40px;
}
.e {color:red;}
.b {color:blue;}
.a {color:green;}
.y {color:orange;}

input, button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    background: #3665f3;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #2c54c7;
}

a {
    display: block;
    margin-top: 10px;
    color: #3665f3;
    cursor: pointer;
}

/* ซ่อน */
.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="box">

    <h1 class="logo">
        <span class="e">e</span>
        <span class="b">b</span>
        <span class="a">a</span>
        <span class="y">y</span>
    </h1>

    
    <div id="loginBox">
        <h3>Login</h3>

        <form onsubmit="login(event)">
            <input type="text" id="loginEmail" placeholder="Email" required>
            <input type="password" id="loginPass" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <p id="loginMsg"></p>

        <a onclick="showRegister()">Create account</a>
    </div>

    
    <div id="registerBox" class="hidden">
        <h3>Register</h3>

        <form onsubmit="register(event)">
            <input type="text" id="regEmail" placeholder="Email" required>
            <input type="password" id="regPass" placeholder="Password" required>
            <button type="submit">Sign Up</button>
        </form>

        <p id="regMsg"></p>

        <a onclick="showLogin()">Back to login</a>
    </div>

</div>

<script>


function showRegister() {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("registerBox").classList.remove("hidden");
}

function showLogin() {
    document.getElementById("registerBox").classList.add("hidden");
    document.getElementById("loginBox").classList.remove("hidden");
}


function register(e) {
    e.preventDefault();

    let email = document.getElementById("regEmail").value;
    let pass = document.getElementById("regPass").value;

    if (localStorage.getItem(email)) {
        document.getElementById("regMsg").innerHTML = "❌ มี user นี้แล้ว";
    } else {
        localStorage.setItem(email, pass);
        document.getElementById("regMsg").innerHTML = "✅ สมัครสำเร็จ";
    }
}


function login(e) {
    e.preventDefault();

    let email = document.getElementById("loginEmail").value;
    let pass = document.getElementById("loginPass").value;

    let saved = localStorage.getItem(email);

    if (saved === null) {
        document.getElementById("loginMsg").innerHTML = "❌ ไม่พบผู้ใช้";
    } else if (saved === pass) {
        document.getElementById("loginMsg").innerHTML = "✅ Login สำเร็จ";
        setTimeout(() => {
            window.location.href = "index.html"; 
        }, 1000);
    } else {
        document.getElementById("loginMsg").innerHTML = "❌ รหัสผ่านผิด";
    }
}

</script>

</body>
</html>
